<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Datos - Dashboard Web</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-navbar">
        <div class="navbar-left">
            <button class="toggle-sidebar-btn" id="toggle-sidebar" aria-label="Toggle Sidebar">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="brand">HV <span>Analytics</span></div>
        </div>
        <div class="navbar-center">
            <div class="mode-toggle">
                <button id="mode-a-btn" class="active">Modo A (1 Exp / N Métricas)</button>
                <button id="mode-b-btn">Modo B (1 Métrica / N Exps)</button>
            </div>
        </div>
        <div class="navbar-right">
        </div>
    </nav>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 id="sidebar-title">Experimentos</h2>
            </div>
            <div class="experiment-list" id="sidebar-list">
                <!-- Sidebar items will be injected here -->
            </div>
        </aside>
        <main class="main-content">
            <header class="main-header">
                <h1 id="view-title">Dashboard de Visualización</h1>
                <p id="view-subtitle">Selecciona una opción en el panel lateral.</p>
                <div id="metadata-container" class="metadata-grid" style="display: none; margin-top: 20px;">
                    <!-- Metadata will be injected here in Mode A -->
                </div>
            </header>
            <div id="grid-view" class="dashboard-grid">
                <!-- Grid of graphs will be injected here -->
                <div class="empty-state">
                    <p>No hay selección.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="data/database.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
