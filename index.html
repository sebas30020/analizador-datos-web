<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Datos - Experimentos</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-navbar">
        <div class="navbar-left">
            <button class="toggle-sidebar-btn" id="toggle-sidebar" aria-label="Toggle Sidebar">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="brand">HV <span>Analytics</span></div>
        </div>
        <div class="navbar-center">
            <ul class="nav-links">
                <li class="active"><a href="#">Dashboard Visual</a></li>
            </ul>
        </div>
        <div class="navbar-right">
        </div>
    </nav>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Experimentos</h2>
            </div>
            <div class="experiment-list" id="experiment-list">
                <!-- Experiment items will be injected here -->
            </div>
        </aside>
        <main class="main-content">
            <header class="main-header">
                <h1>Dashboard de Visualización</h1>
                <p>Selecciona uno o múltiples experimentos para comparar sus métricas.</p>
            </header>
            <div class="grid-container" id="grid-container">
                <!-- Selected experiments will be injected here -->
                <div class="empty-state">
                    <p>No hay experimentos seleccionados.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="data/database.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
